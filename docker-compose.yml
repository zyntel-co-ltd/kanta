# ENG-93: Local Postgres for development (optional). Not used by Vercel deployments.
services:
  postgres:
    image: postgres:16-alpine
    container_name: kanta-local-postgres
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanta
    volumes:
      - kanta_pgdata:/var/lib/postgresql/data

volumes:
  kanta_pgdata:
